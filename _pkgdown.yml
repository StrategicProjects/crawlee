url: https://strategicprojects.github.io/crawlee/

template:
  bootstrap: 5
  bslib:
    primary: "#0b6e4f"

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]

articles:
  - title: Guides
    navbar: ~
    contents:
      - crawlee
      - crawling-a-website
      - storage-and-resumable-runs
      - scaling-and-politeness
      - rag-pipeline

reference:
  - title: Crawler
    desc: Build, configure and run a crawler.
    contents:
      - crawler
      - cr_options
      - cr_use_http
      - cr_use_browser
      - cr_parallel
      - cr_autoscale
      - cr_stream
      - cr_run
      - cr_collect
  - title: Discovery
    desc: Seed the queue from sitemaps and feeds.
    contents:
      - cr_from_sitemap
      - cr_from_rss
  - title: Handlers
    desc: Register handlers and act on fetched content.
    contents:
      - cr_on_html
      - cr_on_pdf
  - title: RAG
    desc: Chunk, embed and export text for retrieval.
    contents:
      - cr_chunk
      - cr_embed
      - cr_export
  - title: Persistence
    desc: Reproducible, resumable runs.
    contents:
      - cr_persist
      - cr_dataset
      - cr_close
  - title: Storage & queue
    desc: Lower-level building blocks.
    contents:
      - Crawler-class
      - RequestQueue
      - Dataset
      - cr_store
      - KeyValueStore
  - title: Utilities
    contents:
      - cr_normalize_url
